server:
  port: 8080

spring:
  application:
    name: agent-console

agent-console:
  base-dir: ${user.home}/.agent-console
  ui-store-path: ${user.home}/.agent-console/ui-store
  agentscope-session-store-path: ${user.home}/.agent-console/agentscope-sessions
  default-agent-name: Sunday
  default-system-prompt: You are a helpful assistant.
  model:
    provider: ollama
    name: ${MODEL:qwen3.5:9B-UD-Q4_K_XL}
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: http://localhost:11434
  memory:
    type: auto-context
    max-context-tokens: 8192
    fallback-to-in-memory: true
